<div class="transfer-selection">

  <!-- Header -->
  <header class="page-header">
    <button class="page-header__back" (click)="goBack()" aria-label="Volver al inicio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
        <path d="M19 12H5M12 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h1 class="page-header__title">Transferir</h1>
    <div class="page-header__spacer"></div>
  </header>

  <!-- Content -->
  <div class="transfer-selection__body">
    <p class="transfer-selection__subtitle">
      Selecciona el tipo de transferencia
    </p>

    <div class="transfer-options" role="list">
      @for (option of options; track option.id) {
        <button
          class="transfer-option"
          [class.transfer-option--available]="option.available"
          [class.transfer-option--disabled]="option.disabled"
          [disabled]="option.disabled"
          (click)="select(option)"
          role="listitem"
          [attr.aria-label]="option.title + (option.disabled ? ' (próximamente)' : '')"
        >
          <span class="transfer-option__icon" aria-hidden="true">{{ option.icon }}</span>
          <div class="transfer-option__text">
            <span class="transfer-option__title">{{ option.title }}</span>
            <span class="transfer-option__desc">{{ option.description }}</span>
          </div>
          <div class="transfer-option__right">
            @if (option.disabled) {
              <span class="transfer-option__tag">Próximamente</span>
            } @else {
              <svg class="transfer-option__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                <path d="M9 18l6-6-6-6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            }
          </div>
        </button>
      }
    </div>
  </div>

</div>
