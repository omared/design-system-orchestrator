<div *ngIf="isOpen" class="ds-modal-overlay" (click)="onOverlayClick($event)">
  <div [class]="'ds-modal ds-modal--' + size" role="dialog" aria-modal="true">
    <div class="ds-modal-header">
      <h2 class="ds-modal-title">{{ title }}</h2>
      <button type="button" class="ds-modal-close" (click)="onClose()" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M18 6L6 18M6 6l12 12" stroke-width="2" stroke-linecap="round" />
        </svg>
      </button>
    </div>

    <div class="ds-modal-body">
      <ng-content />
    </div>

    <div class="ds-modal-footer">
      <ng-content select="[footer]" />
    </div>
  </div>
</div>
