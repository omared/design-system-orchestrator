<div class="ds-accordion">
  <div *ngFor="let item of items" class="ds-accordion-item" [class.open]="item.isOpen">
    <button type="button" class="ds-accordion-header" (click)="toggle(item)" [attr.aria-expanded]="item.isOpen">
      <span class="ds-accordion-title">{{ item.title }}</span>
      <svg class="ds-accordion-icon" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd"
          d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
          clip-rule="evenodd" />
      </svg>
    </button>

    <div class="ds-accordion-content" [class.open]="item.isOpen">
      <div class="ds-accordion-body">
        {{ item.content }}
      </div>
    </div>
  </div>
</div>
