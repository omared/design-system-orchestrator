<label class="ds-checkbox-wrapper" [class.disabled]="disabled">
  <input type="checkbox" class="ds-checkbox-input" [checked]="checked" [disabled]="disabled"
    (change)="onCheckChange($event)" />
  <span class="ds-checkbox-box">
    <svg class="ds-checkbox-icon" viewBox="0 0 16 16" fill="none">
      <path d="M13.5 4L6 11.5L2.5 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round" />
    </svg>
  </span>
  <span *ngIf="label" class="ds-checkbox-label">{{ label }}</span>
</label>
