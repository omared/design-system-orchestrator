<div class="ds-dropdown-wrapper">
  <label *ngIf="label" class="ds-dropdown-label">{{ label }}</label>

  <div class="ds-dropdown" [class.open]="isOpen" [class.disabled]="disabled">
    <button type="button" class="ds-dropdown-trigger" (click)="toggleDropdown()" [disabled]="disabled">
      <span class="ds-dropdown-text">
        {{ selectedLabel || placeholder }}
      </span>
      <svg class="ds-dropdown-icon" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd"
          d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
          clip-rule="evenodd" />
      </svg>
    </button>

    <div *ngIf="isOpen" class="ds-dropdown-menu">
      <button *ngFor="let option of options" type="button" class="ds-dropdown-item" [class.disabled]="option.disabled"
        [class.selected]="option.value === value" (click)="selectOption(option)">
        {{ option.label }}
      </button>
    </div>
  </div>
</div>
